    <section class="story-section">
        <div class="container">
            <div class="story-grid">
                <div class="story-image" data-aos="fade-right">

                </div>
                <div class="story-text" data-aos="fade-left">
                    <div class="section-label" data-ar="قصتنا" data-en="Our Story"></div>
                    <h2 data-ar="رحلة بدأت برؤية... واستمرت بشغف" data-en="A Journey That Started with a Vision... and Continued with Passion"></h2>
                    <p data-ar="تأسست شركة zimam عام 2015م برؤية طموحة لإحداث نقلة نوعية في قطاع الدواجن الليبي. بدأنا كمشروع صغير لتربية الكتاكيت، ومع إصرارنا على الجودة والابتكار، نمونا لنصبح إحدى أكبر شركات إنتاج الدواجن في ليبيا." data-en="Zimam Co. was founded in 2015م with an ambitious vision to transform the Libyan poultry sector. We started as a small chick-rearing project, and with our commitment to quality and innovation, we grew to become one of the largest poultry production companies in Libya."></p>
                    <p data-ar="اليوم، تمتلك zimam منظومة متكاملة تشمل التربية والتسمين والذبح والتجهيز والتوزيع، مع 12 مرفقاً إنتاجياً، وأكثر من 1500 موظف، وإنتاج سنوي يتجاوز 50 مليون دجاجة، نخدم من خلالها أكثر من 500 شريك تجاري في جميع أنحاء ليبيا." data-en="Today, Zimam owns an integrated system encompassing rearing, fattening, slaughtering, processing, and distribution, with 12 production facilities, over 1,500 employees, and an annual production exceeding 50 million chickens, serving more than 500 trade partners across Libya."></p>
                    <a href="contact.html" class="btn btn--primary">
                        <span data-ar="تواصل معنا" data-en="Contact Us"></span>
                        <i class="fa-solid fa-arrow-left" data-arrow-rtl></i>
                    </a>
                </div>
            </div>

                </div>

                </div>
                <div class="vmv-card" data-aos="fade-up" data-aos-delay="200">

    <!-- HISTORY TIMELINE -->
    <section class="section">
        <div class="container">
            <div class="section-header" data-aos="fade-up">
                <div class="section-label" data-ar="مسيرتنا" data-en="Our Journey"></div>

            </div>
            <div class="history-timeline">
                <div class="history-item" data-aos="fade-up">
                    <div class="history-year">2015م</div>
                    <div class="history-content">
                        <h4 data-ar="التأسيس" data-en="Founding"></h4>
                        <p data-ar="تأسست zimam للدواجن كمشروع صغير لتربية الكتاكيت في منطقة العزيزية بطرابلس، بطاقة إنتاجية محدودة وفريق صغير من المؤسسين." data-en="Zimam Co. was founded as a small chick-rearing project in Al-Aziziya area of Tripoli, with limited production capacity and a small founding team."></p>
                    </div>
                </div>
                <div class="history-item" data-aos="fade-up">
                    <div class="history-year">2010</div>
                    <div class="history-content">
                        <h4 data-ar="التوسع الأول" data-en="First Expansion"></h4>
                        <p data-ar="افتتاح أول مصنع لتجهيز وذبح الدواجن بقدرات إنتاجية متطورة، وتوسيع شبكة التوزيع لتشمل جميع مدن غرب ليبيا." data-en="Opening the first poultry processing and slaughtering plant with advanced production capabilities, and expanding the distribution network to cover all cities in western Libya."></p>
                    </div>
                </div>
                <div class="history-item" data-aos="fade-up">
                    <div class="history-year">2015</div>
                    <div class="history-content">
                        <h4 data-ar="الاعتماد الدولي" data-en="International Certification"></h4>
                        <p data-ar="حصلت zimam على شهادة ISO 22000 لنظام إدارة السلامة الغذائية، وشهادة HACCP، لتصبح أول شركة دواجن ليبية تحقق هذا الإنجاز." data-en="Zimam obtained ISO 22000 certification for food safety management system and HACCP certification, becoming the first Libyan poultry company to achieve this milestone."></p>
                    </div>
                </div>
                <div class="history-item" data-aos="fade-up">
                    <div class="history-year">2020</div>
                    <div class="history-content">
                        <h4 data-ar="إنتاج 50 مليون" data-en="50 Million Production"></h4>
                        <p data-ar="تجاوز الإنتاج السنوي 50 مليون دجاجة، وتوسيع الأسطول لأكثر من 50 شاحنة مبردة تغطي جميع أنحاء ليبيا." data-en="Annual production exceeded 50 million chickens, and the fleet expanded to more than 50 refrigerated trucks covering all of Libya."></p>
                    </div>
                </div>
                <div class="history-item" data-aos="fade-up">
                    <div class="history-year">2024</div>
                    <div class="history-content">
                        <h4 data-ar="أكبر مصنع في غرب ليبيا" data-en="Largest Plant in Western Libya"></h4>
                        <p data-ar="افتتاح أكبر مصنع لتجهيز الدواجن في غرب ليبيا باستثمار 30 مليون دينار وطاقة إنتاجية 20 ألف دجاجة يومياً." data-en="Opening the largest poultry processing plant in western Libya with an investment of 30 million dinars and a daily production capacity of 20,000 chickens."></p>
                    </div>
                </div>
            </div>
        </div>
    </section>
