<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Chicken Icon -->
  <g transform="translate(8, 10)">
    <!-- Body -->
    <ellipse cx="22" cy="32" rx="16" ry="20" fill="#0F5132"/>
    <!-- Head -->
    <circle cx="38" cy="18" r="10" fill="#0F5132"/>
    <!-- Beak -->
    <polygon points="48,16 56,18 48,20" fill="#F9A826"/>
    <!-- Eye -->
    <circle cx="41" cy="16" r="2" fill="white"/>
    <circle cx="41.5" cy="15.5" r="1" fill="#1A1A1A"/>
    <!-- Comb -->
    <path d="M34 8 Q36 4 38 8 Q40 4 42 8" fill="#E53935" stroke="#E53935" stroke-width="1"/>
    <!-- Wattle -->
    <ellipse cx="46" cy="22" rx="3" ry="4" fill="#E53935"/>
    <!-- Wing -->
    <ellipse cx="18" cy="30" rx="10" ry="12" fill="#1a7a4c" opacity="0.6"/>
    <!-- Tail -->
    <path d="M6 20 Q2 12 8 8 Q6 16 10 14 Q6 22 12 18" fill="#1a7a4c"/>
    <!-- Legs -->
    <line x1="18" y1="50" x2="14" y2="62" stroke="#F9A826" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="26" y1="50" x2="30" y2="62" stroke="#F9A826" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Feet -->
    <path d="M10 62 L14 62 L18 62" stroke="#F9A826" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M26 62 L30 62 L34 62" stroke="#F9A826" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Arabic Text: زمام -->
  <text x="72" y="42" font-family="Cairo, Arial, sans-serif" font-size="36" font-weight="900" fill="#0F5132" direction="rtl">زمـام</text>

  <!-- Dot accent -->
  <circle cx="155" cy="28" r="5" fill="#F9A826"/>

  <!-- English Text: ZIMAM -->
  <text x="68" y="62" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#666666" letter-spacing="4">ZIMAM POULTRY</text>

  <!-- Tagline underline -->
  <line x1="68" y1="66" x2="165" y2="66" stroke="#F9A826" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
